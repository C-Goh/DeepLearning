<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Klassifikation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

</head>

<body>
    <header>
        <h1>Image Klassifikation mit ml5.js</h1>
    </header>

    <body>

        <div id="examples">
            <div class="column">
                <h2>Korrekte Klassifikation</h2>

                <div class="example-row">
                    <img src="./img/katze.png">
                    <div class="example-result" id="result-0"></div>
                </div>

                <div class="example-row">
                    <img src="./img/hund.png">
                    <div class="example-result" id="result-1"></div>
                </div>

                <div class="example-row">
                    <img src="./img/banane.png">
                    <div class="example-result" id="result-2"></div>
                </div>
            </div>

            <div class="column">
                <h2>Falsche Klassifikation</h2>

                <div class="example-row">
                    <img src="./img/apfel.png">
                    <div class="example-result" id="result-3"></div>
                </div>

                <div class="example-row">
                    <img src="./img/Obstsalat.png">
                    <div class="example-result" id="result-4"></div>
                </div>

                <div class="example-row">
                    <img src="./img/Oger.png">
                    <div class="example-result" id="result-5"></div>
                </div>
            </div>
        </div>

        <div id="user">
            <div id="upload">
                <p>Bitte laden Sie ein Bild hoch</p>
                <input type="file" id="imageUpload" />

                <div id="controlls">
                    <button id="classifyButton" disabled onclick="classifyImage()">Classify</button>
                </div>
            </div>

            <div id="chart">

            </div>
            <script src="script.js"></script>

        </div>

        <div id="documentation">
            <h2>Dokumentation
            </h2>

        </div>


    </body>
    <footer>
        <p>&copy; 2026 Deep Learning Projekt</p>
    </footer>

</body>

</html>
